## divorce answer respond to complaint paragraphs
# --------------------------------------------------------------------
---
objects:
  - complaint_paragraphs: DAList.using(
      question_text="Respond to each complaint paragraph",
      minimum_number=1,
      noun_sl="paragraph",
      complete_attribute="complete",
      object_type = DAObject,
      there_are_any = True
      )
---
template: complaint_paragraphs.there_is_another_template
content: |
  Continue until you have responded to **all of the paragraphs** in your spouse’s complaint.
---
table: complaint_paragraphs.table
rows: complaint_paragraphs
columns:
  - Paragraph: |
      " ".join((str(row_item.number), row_item.letter))
  - Your response: word("I agree") if row_item.response == "agree" else word("I disagree") if row_item.response == "disagree" else word("I don't know")
  #- Comment: row_item.details if row_item.response == "disagree" else ""
edit:
  - number
delete buttons: True
confirm: True
allow reordering: True
---
id: complaint_paragraphs.revisit
question: |
  ${complaint_paragraphs.question_text}
subquestion: |
  ${complaint_paragraphs.there_is_another_template}

  % if complaint_paragraphs:
  So far, you have listed&colon;

  ${complaint_paragraphs.table}
  % endif

  ${complaint_paragraphs.add_action(color="success", size="md")}
continue button field: complaint_paragraphs.revisit
---
code: |
  complaint_paragraphs[i].number
  complaint_paragraphs[i].complete = True
---
id: intro to complaint paragraph response
continue button field: complaint_paragraphs_intro
question: Answering the Complaint
subquestion: |
  For the next section of the tool, look at the complaint for divorce that you received. For each numbered paragraph and subparagraph decide whether you:
  
  * **Agree** that the statements are true, or
  * **Disagree** that the statements are true, or
  * **Do not know** if the statements are true.

  You should respond to **every paragraph and subparagraph** in the order that they appear in your complaint.
---
id: collect a paragraph response
question: |
  % if i == 0:
  Respond to the first paragraph
  % else:
  Respond to the next paragraph
  % endif
subquestion: |
  ${complaint_paragraphs.question_text_table_template}
fields:
  - Paragraph number: complaint_paragraphs[i].number
    datatype: integer
    label above field: False
  - label: |
      Paragraph letter  
      (if any)
    field: complaint_paragraphs[i].letter
    label above field: False
    required: False
  - note: |
      Carefully read the paragraph.
  - "Answer whether you agree, disagree, or don’t know if the statements in that paragraph are true.": complaint_paragraphs[i].response
    input type: radio
    choices: 
      - "I agree": agree
      - "I disagree": disagree
      - "I do not know whether the statements are true": unsure
  - "Optional comment:": complaint_paragraphs[i].details
    required: False
    input type: area
    rows: 2
    maxlength: 140
    show if:
      variable: complaint_paragraphs[i].response
      is: agree
  - label: |
      I disagree that the statements in this paragraph are true because:
    field: complaint_paragraphs[i].details
    input type: area
    rows: 2
    maxlength: 140
    show if:
      variable: complaint_paragraphs[i].response
      is: disagree
  - "Optional comment:": complaint_paragraphs[i].details
    required: False
    input type: area
    rows: 2
    maxlength: 140
    show if:
      variable: complaint_paragraphs[i].response
      is: unsure
  - note: |
      *(140 character limit)*
    js show if: |
      ['agree', 'disagree', 'unsure'].includes(val("complaint_paragraphs[i].response"))
---
# --------------------------------------------------------------------
## other divorce answer questions (that didn't naturally fit above)
# --------------------------------------------------------------------
---
id: file a counterclaim
question: |
  Filing a Counterclaim  
subquestion: |
  You have finished the section of the tool for creating your *answer* to the complaint for divorce. The next section of the tool creates a *counterclaim* for divorce.

  A counterclaim is needed if you want to:

  * **change your last name** as part of the divorce
  * ask for **spousal support**
  * ask the court to **address any other issue** or order something that your spouse did not request in their Complaint for Divorce
  * make sure the divorce case **can be finished** if your spouse stops participating. 

  ${collapse_template(no_counterclaim_exp)}
fields: 
  - Do you want to create a counterclaim for divorce?: create_counterclaim
    datatype: yesnoradio
---
template: no_counterclaim_exp
subject: |
  What if I don't file a counterclaim?
content: |
  If you do not file a counterclaim for divorce and your spouse does something to have the case dismissed, your divorce case will end. Then, if you still want to get divorced, you will have to start over by filing a new case.

  You also will **not** be able to:

  * **change your last name** as part of the divorce
  * ask for **spousal support**
  * ask the court to **address other issues** your spouse did not raise
---