question: Sorry, this tool cannot help you.
subquestion: |
  If you have a separate maintenance case that is currently pending or stayed, you cannot file a new divorce case. Instead:

  * If you are the "plaintiff" (the person who originally filed) in the separate maintenance case, you need to first dismiss the separate maintenance case and then file for divorce.
  * If you are the "defendant" (if your spouse originally filed) in the separate maintenance case, you need to file a counterclaim for divorce in your separate maintenance case. 
  
