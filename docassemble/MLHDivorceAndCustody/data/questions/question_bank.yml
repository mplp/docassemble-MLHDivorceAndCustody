template: custody_definitions
subject: |
  More information about **custody**
content: |
  The court can order:
  
  * **one parent** to have sole legal and physical custody, 
  * joint legal and physical custody **shared between the parents,** or 
  * a combination of the two types of custody.
  
  ===== **Legal Custody** =====
  
  Having legal custody of your children means having the right to make important decisions about their lives, like where they go to school, what religion they are, and major medical decisions. Either parent can have sole legal custody, or parents can have joint legal custody. 
  
  When parents have joint legal custody, they both have the right to weigh in on important decisions about their kids. Both parents must agree on important decisions. If they can’t agree, they may have to ask the judge to decide. 
  
  If a parent has sole legal custody, that parent can make these important decisions without the other parent’s agreement.

  ===== **Physical Custody** =====

  Physical custody can mean the child's primary residence, but a child often has a residence with each parent, and each parent has physical custody during the time the child is with that parent unless a court orders otherwise. 
---
template: PT_definitions
subject: |
  More information about **parenting time**
terms:
  noncustodial parent: |
    The "**noncustodial parent**" is the parent who does **not** have sole or primary physical custody of the children. 
    
    The "custodial parent" generally refers to the parent with whom the children live most of the time.
content: |
  Parenting time, different from custody, is how a child spends time with each parent. It can involve a schedule of days and also opportunities for the child to have other contact with a parent virtually or by phone. 
  
  A parent who has less parenting time with a child than the other parent can still be a joint legal or physical custodian. Some parents might spend exactly equal amounts of parenting time with a child, but if they cannot cooperate with each other on decision-making for the child, the court can decide that one parent is the sole legal custodian.

  Types of parenting time:
  
  * **Reasonable** parenting time means that specific dates, times, and other conditions are left for the parents to work out. If you believe that you and your spouse can agree on parenting time arrangements, you may ask for reasonable parenting time. However, if the judge orders reasonable parenting time, and you and your spouse can’t agree, the judge may not be able to enforce the order or judgment. You will need to return to court and ask for a specific parenting time schedule in order for the judge to enforce the judgment.
  * **Specific** parenting time means that all of the dates, times, and conditions for visits are included in the court order. Many counties have standard parenting time schedules that you can use in your case. You can contact the Friend of the Court in the county where your case will be filed and ask if there is a standard parenting time schedule. You can also find sample schedules in the [Michigan Parenting Time Guideline](https://www.courts.michigan.gov/4a537f/siteassets/court-administration/standardsguidelines/foc/pt_gdlns.pdf).
  * **Specific and supervised** parenting time means that all of the dates, times, and conditions for visits are included in the court order. The judge will order parenting time to be supervised by a third party – such as a relative, friend, or supervised parenting time center. Supervised parenting time may be appropriate if the {noncustodial parent} is a risk to the children. The supervisor must be willing to supervise parenting time. (This option does not apply if both parents share physical custody.)

