# LHI: "Plaintiff Income" or "Defendant Income"
id: user public assistance
question: Do you receive public assistance?
subquestion: |
  ${ collapse_template(public_assistance_template) }
fields:
  - Do you get public assistance that is **based on having low income**?: pa_status
    datatype: radio
    required: False
    choices:
      - "Applied, but not yet receiving assistance": applied
      - Currently receiving assistance: gets_assistance
      - Neither: none
      - Unknown: unknown

# note divorce tool currently only asks for SSI case number if there is no MDHHS case number. (And in that case prints a PII form.) Fee waiver tool only uses SSI case number if there's no MDHHS and no "Other" case number. So probably should follow same logic here. 
# note, if they choose "applied, but not receiving", only ask for specific type of aid if there are children or possibly if they're asking for spousal support. (Note that for complaint we do ask the income questions even if there's no kids or spousal support.)
---
id: public assistance types divorce/custody user
question: |
  Public Assistance
subquestion: |
  Which type(s) of public assistance do you receive or have you applied for? *Check all that apply.*
fields:
  - "Food Assistance Program through the state of Michigan (also known as FAP or SNAP)": pa_food_assistance_program
    datatype: yesno
  - "Medicaid (including Healthy Michigan, CHIP, and ESO)": pa_medicaid
    datatype: yesno
  - "Family Independence Program through the state of Michigan (also known as FIP or TANF)": pa_family_independence_program
    datatype: yesno
  - "Women, Infants, and Children benefits (WIC)": pa_women_infants_children
    datatype: yesno
  - "State Disability Assistance (SDA)": pa_state_disability
    datatype: yesno
  - "State Emergency Relief (SER)": pa_state_emergency_relief
    datatype: yesno
  - "Refugee Assistance Program (RAP)": pa_refugee_assistance
    datatype: yesno
  - "Supplemental Security Income through the federal government (SSI)": pa_supplemental_security
    datatype: yesno
  - "Other means-tested public assistance": pa_other
    datatype: yesno
---
if: pa_other
id: public assistance other divorce/custody
question: Other Public Assistance
subquestion: |
  Name the other type(s) of public assistance that you get, the source of the assistance, and your case numbers.

  % if pa_status == "gets_assistance":
  **Do not include your Social Security number.** 
  If your case number has a Social Security number in it, **do not** enter it here. 
  
  % endif
  % if not pa_supplemental_security:
  If you get Supplemental Security Income (SSI), click **${MLH_back_button_label}** and select that option. 
  % endif
fields:
  - "Type(s) of assistance": pa_other_types
    maxlength: 49
  - "Case number(s) *Do not include your Social Security number*": pa_other_case_numbers
    show if: 
      code: |
        pa_status == "gets_assistance"
---
id: FOC 23 user list of public assistance
code: |
  public_assistance_list = []
  if pa_food_assistance_program:
    public_assistance_list.append("FAP")
  if pa_medicaid:
    public_assistance_list.append("MA CDC")
  if pa_family_independence_program:
    public_assistance_list.append("FIP")
  if pa_women_infants_children:
