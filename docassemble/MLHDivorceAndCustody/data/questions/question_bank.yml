  elif tool_ID != "JOD_only":
    prior_family_cases[i].status
    if there_are_marital_children:
      if prior_family_cases[i].state != "MI":
        prior_family_cases[i].address # trigger question if user changes answer on marital children from none to some, after case already gathered
  
      if prior_family_cases[i].type == "separate_maintenance":
        if prior_family_cases[i].status in ["ended_with_order", "dismissed"]:
          prior_family_cases[i].involved_custody_pt_support
          if prior_family_cases[i].status == "ended_with_order":
            prior_family_cases[i].convert_separate_maintenance_notice
        elif prior_family_cases[i].status in ["pending", "stayed"]:
          prior_family_cases[i].separate_maintenance_pending_kickout
  
      elif prior_family_cases[i].type != "separate_maintenance":
        prior_family_cases[i].included_custody_PT_order

  prior_family_cases[i].complete = True
