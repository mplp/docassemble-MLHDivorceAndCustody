## introduction
# --------------------------------------------------------------------
---
id: marriage.pending_divorce
question: |
  Pending divorce
fields:
  - label: Do you have a pending divorce case with this spouse in any court?
    field: marriage.pending_divorce
    datatype: yesnoradio
validation code: |
  if not marriage.pending_divorce:
    edit_existing_divorce = False
    returning_to_finalize = False
---
if: tool_ID in ["JOD_only", "divorce_answer"] or (tool_ID == "divorce_complaint" and returning_to_finalize)
id: Choose a court
question: In what county was the divorce filed?
continue button field: county_where_filed
subquestion: |
  ${ collapse_template(help_user_choose_court_template) }
fields:
  - County: county_choice
    code: court_list._load_courts()["address_county"].unique()
validation code: |
  undefine("court_index", "the_court", "the_foc", "party_lived_6_months_MI", "party_ten_days_in_county", "jurisdiction_warning")
---
if: tool_ID == "divorce_answer"
id: divorce complaint filed?
question: The divorce complaint
fields:
  - Did you receive a complaint for divorce that was filed in Michigan?: complaint_received
    datatype: yesnoradio
  - Were you {personally served} the complaint?: personally_served
    datatype: yesnoradio
    show if:
      variable: complaint_received
      is: True
---
if: tool_ID == "divorce_answer"
id: divorce complaint is with or without children
question: Type of divorce complaint
fields:
  - Which type of divorce complaint did you receive?: complaint_type
    # maybe this should directly set there_are_marital_children?
    input type: radio
    choices:
      - Complaint for divorce without minor children: "no_children"
      - Complaint for divorce with minor children: "with_children"
  - note: |
      This type of complaint is used if there is at least one {minor} child who has **both** you and your spouse as legal parents.
    show if:
      variable: complaint_type
      is: "with_children"
  - note: |
      This type of complaint is used if there are **no** {minor} children who have both you and your spouse as legal parents.
    show if:
      variable: complaint_type
      is: "no_children"
  - Do you want to continue?: complaint_type_continue
    datatype: yesnoradio
    js show if: |
      val("complaint_type") === "no_children" || val("complaint_type") === "with_children"
validation code: |
  if complaint_type == "no_children":
    there_are_marital_children = False
  else:
    there_are_marital_children = True
---
if: tool_ID in ["JOD_only", "divorce_answer"] or (tool_ID == "divorce_complaint" and returning_to_finalize)
id: case already filed jurisdiction check
question: Time in ${ county_choice } County and in Michigan before your divorce case
subquestion: |
  ${collapse_template(jurisdiction_check_help)}
fields:
  - label: |
      % if tool_ID in ["JOD_only", "divorce_complaint"]:
      Who lived in **Michigan for 180 days before you filed** for divorce? 
      % elif tool_ID == "divorce_answer":
      Who lived in **Michigan for 180 days before your spouse filed** for divorce? 
      % endif
    field: party_lived_6_months_MI
    datatype: checkboxes
    choices:
      - Me: user
      - My spouse: other_party
    none of the above: |
      Neither of us
  - label: |
      % if tool_ID in ["JOD_only", "divorce_complaint"]:
      Who lived in **${ county_choice } County for 10 days before you filed** for divorce? 
      % elif tool_ID == "divorce_answer":
      Who lived in **${ county_choice } County for 10 days before your spouse filed** for divorce? 
      % endif
    field: party_ten_days_in_county
    datatype: checkboxes
    choices:
      - Me: user
      - My spouse: other_party
    none of the above: |
      Neither of us
    js show if: |
      val("party_lived_6_months_MI['user']") || val("party_lived_6_months_MI['other_party']")
---
template: jurisdiction_check_help
subject: Why does this matter?
content: |
  At the end of your divorce, you may need to testify (tell the judge under oath) whether you met the legal requirements to get divorced in ${ county_choice } County. 
  
  Usually, **either you or your spouse** must have:

  * lived in Michigan for 180 days before ${word("you") if tool_ID in ["divorce_complaint", "JOD_only"] else word("your spouse")} filed for divorce, **and**
  * lived in ${ county_choice } County for 10 days before ${word("you") if tool_ID in ["divorce_complaint", "JOD_only"] else word("your spouse")} filed for divorce.

  The same person must meet both of the requirements.
---
# used in JOD_only and divorce_complaint tools
id: jurisdiction warning
continue button field: jurisdiction_warning
question: "**Warning!** There may be a jurisdiction issue."
subquestion: |
  To get a divorce in ${ county_choice } County, usually **one spouse** must **both**:

  * have lived in Michigan for 180 days before you filed for divorce, **and**
  * have lived in ${ county_choice } County for 10 days before you filed for divorce.

  You said you and your spouse did **not** meet these requirements.
  
  You should **talk to a lawyer** about the potential jurisdiction issue. ${MLH_GUIDE_FULL}
---
id: venue warning
question: There may be an issue getting divorced in ${county_choice} County
subquestion: |
  Your answers indicate that ${county_choice} County may not be the proper venue (filing county) for this divorce case. To get a divorce in ${ county_choice } County, usually **one spouse** must **both**:

  * have lived in Michigan for 180 days before your spouse filed for divorce, **and**
  * have lived in ${ county_choice } County for 10 days before your spouse filed for divorce.

  You said you and your spouse did **not** meet these requirements.
  
  If you believe your spouse may have filed this divorce case in the wrong county, you may want to consider talking to a lawyer. ${MLH_GUIDE_FULL}
  
  You can still use this tool to prepare an answer and counterclaim to your spouse's complaint, but you should let the judge know as soon as possible that venue may be improper. 
fields:
  - Do you want to continue with this tool?: venue_issue_continue
    datatype: yesnoradio
---
id: docket number
question: |
  Case number
subquestion: |
  ${ collapse_template(where_case_number) }

  Be certain to enter the "-DO" or "-DM" at the end of the number.
fields:
  - label: What is the case number?
    field: docket_number
    maxlength: 25
---
id: judge's last name
question: Judge's last name
subquestion: |
  Enter the last name of the judge in the divorce case. 
  
  *Do not include 'Judge' or 'Hon.'.*
fields:
  - "Judge": divorce_judge
    label above field: False
---
id: what is the user's role?
question: |
  Are you the Plaintiff or the Defendant in this case?
subquestion: |
  ${collapse_template(help_user_ask_role_template)}
fields:
  - label: What party are you in your case?
    field: user_ask_role
    label above field: True
    datatype: radio
    choices:
      - label: I am the Plaintiff
        value: plaintiff
      - label: I am the Defendant
        value: defendant
  - note: |
      Okay, you are the **Plaintiff** in this case. The other
      side is the Defendant.
    show if:
      variable: user_ask_role
      is: plaintiff
  - note: |
      Okay, you are the **Defendant** in this case. The other
      side is the Plaintiff.
    show if:
      variable: user_ask_role
      is: defendant
# TODO: commented out the below on 2/2/26. I think it's unnecessary. Delete if no problems seen in JOD_only tool.
#validation code: |
#  op_ask_role = "defendant" if user_ask_role == "plaintiff" else "plaintiff"
---
id: marriage.breakdown
question: |
  Marriage breakdown
subquestion: |
  Michigan law requires you to testify that there has been a breakdown of the marriage to the extent that the objects of matrimony have been destroyed and there remains no reasonable likelihood that your marriage can be preserved. This means that there has been a serious, permanent, marital breakdown. It means it is very unlikely that you and your spouse can work things out.
fields:
  - label: Has there been a breakdown of the marriage to the extent that the objects of matrimony have been destroyed and there remains no reasonable likelihood that the marriage can be preserved?
    field: marriage.breakdown
    datatype: yesnoradio
---
id: incompetent spouse
question: |
  Your spouse's legal competence
fields:
  - To the best of your knowledge, has a judge found your spouse to be legally incompetent?: spouse_is_incompetent
    datatype: yesnoradio    
  - note: |
      If your spouse does not file an answer to your divorce complaint, you may be entering a default judgment of divorce against him or her. You may not enter a default judgment against a person who is not legally competent to understand the divorce proceedings.
    show if:
      variable: spouse_is_incompetent
      is: True
---
id: military spouse
question: |
  Spouse in the military?
subquestion: |
  ${collapse_template(military_spouse_info)}
fields:
  - Is your spouse currently on active military duty in the United States armed forces?: spouse_is_in_military
    datatype: yesnoradio
  - note: |
      If your spouse is on active military duty, you may only use this tool to prepare your divorce forms if your spouse:
      
      * agrees to the divorce, 
      * agrees to all the terms of the divorce, and 
      * will sign a Consent Judgment of Divorce. 
      
      If your spouse is on active military duty and doesn't agree to the divorce or all the terms of the divorce, you may want to talk to a lawyer to help you complete your divorce.
    show if:
      variable: spouse_is_in_military
      is: True
  - Will you and your spouse be filing a Consent Judgment of Divorce?: military_spouse_agrees_consent_judgment
    datatype: radio
    choices:
      - Yes: yes
      - No: no
      - "I don't know": unknown
    show if:
      variable: spouse_is_in_military
      is: True
---
template: military_spouse_info
subject: What if I'm not sure?
content: |
  If your spouse is or may be on active military duty, you may only use this tool to prepare your divorce forms if your spouse agrees to the divorce, agrees to all of the terms of the divorce, and will sign a Consent Judgment of Divorce. 
  
  Please return to use this tool when you have determined if your spouse is currently on active military duty. 
---
id: need temp order
question: Need a temporary order to secure marital property?
fields:
  - Do you **need a temporary order** to stop your spouse from transferring, hiding, selling, or getting rid of **marital property or assets?**: need_temporary_order
    datatype: yesnoradio
  - note: |
      % if tool_ID == "divorce_answer":
      **WARNING!** This tool may not be right for you. Getting a temporary order to prevent a spouse from transferring, selling, hiding, or getting rid of property is not simple. 
      
      You can continue with the tool and get the forms you need to file an answer to your spouse's divorce complaint and to file a counterclaim for divorce, but this tool will not create any motions for temporary orders or proposed temporary orders. 
      
      You may want to consider hiring a lawyer to help you get a temporary order. Even if your spouse has a lawyer, you should consider hiring your own. Your spouse’s lawyer does not represent you and has a duty to do what is best for your spouse. ${MLH_GUIDE_FULL}
      % else:
      **WARNING!** This tool may not be right for you. You cannot use this tool or the Michigan Legal Help website to get a temporary order. 
      
      Getting a temporary order to prevent a spouse from transferring, selling, hiding, or getting rid of property is not simple. You can still complete this tool to prepare your forms and begin the divorce process, but this tool will not create any motions for temporary orders or proposed temporary orders. 
      
      You may want to consider hiring a lawyer to help you ask the judge for a temporary restraining order. ${MLH_GUIDE_FULL}
      % endif
    show if:
      variable: need_temporary_order
      is: True
  - Do you want to continue?: temporary_order_continue
    datatype: yesnoradio
    show if:
      variable: need_temporary_order
      is: True
---
id: marriage.have_pension_retirement
question: |
  Pension and/or retirement accounts
fields:
  - label: Do you or your spouse have a pension or retirement account?
    field: marriage.have_pension_retirement
    datatype: yesnoradio
---
if: marriage.have_pension_retirement
id: marriage.pension_retirement_accounts_keep_own
question: |
  Pension and/or retirement accounts
fields:
  - label: Do you each plan to keep your own accounts or do you want to ask the judge to divide your accounts?
    field: marriage.pension_retirement_accounts_keep_own
    input type: radio
    choices:
      - label: We will each keep our own account(s)
        value: True
      - label: I want the judge to divide our account(s)
        value: False
---
if: tool_ID in ["divorce_complaint", "JOD_only"] and marriage.have_pension_retirement and marriage.pension_retirement_accounts_keep_own
id: pension_retirement_accounts_keep
question: |
  Pension and/or retirement accounts
subquestion: |
  You may have a right to part of your spouse's pension or retirement account, and your spouse may have a right to part of yours. This is an important decision that can impact your future. Sometimes it is hard to know the full value of a pension or retirement account, especially if an account includes future benefits. If you don't know all the details of each person's pension and retirement accounts, you may want to consider talking to a lawyer before you decide how you want to divide them.
fields:
  - label: Do you want to continue with the tool, knowing that you will not get a share of your spouse's pension or retirement account and will not be able to return to court in the future and ask for a change?
    field: marriage.pension_retirement_accounts_continue
    datatype: yesnoradio
---
if: tool_ID in ["divorce_complaint", "JOD_only"] and marriage.have_pension_retirement and not marriage.pension_retirement_accounts_keep_own
id: pension_retirement_accounts_divide
question: |
  Pension and/or retirement accounts
subquestion: |
  **WARNING!** Dividing pensions or retirement accounts is not easy. You will likely need a special order called a QDRO or EDRO that this tool does not provide. You can still use this tool, but the Pension/Retirement Account Addendum to the Judgment of Divorce will be **incomplete.**
  
  You will need to find a lawyer to help you complete the Judgment of Divorce and prepare a QDRO or EDRO. ${MLH_GUIDE_FULL}
fields:
  - label: Do you want to continue?
    field: marriage.pension_retirement_accounts_continue
    datatype: yesnoradio
---
if: tool_ID == "divorce_answer" and marriage.have_pension_retirement
id: divorce answer pension warning
question: |
  Pension and/or retirement accounts
subquestion: |
  **WARNING!** This tool may not be right for you. Dividing pensions or retirement accounts is not simple. You may need to hire a lawyer to help you ask the judge to divide your pensions or retirement accounts. A lawyer can also draft the special order that is required. 
  
  Even if your spouse has a lawyer, you may need to hire your own. Your spouse’s lawyer does not represent you and has a duty to do what is best for your spouse. You can continue with the tool and get the forms you need to file an answer to your spouse's divorce complaint and to file a counterclaim for divorce. However, you may want to consider hiring a lawyer to help you finish your case. ${MLH_GUIDE_FULL}
fields:
  - label: Do you want to continue?
    field: marriage.pension_retirement_accounts_continue
    datatype: yesnoradio
---
id: marriage.have_business
question: |
  Business ownership
fields:
  - label: Do you or your spouse own a business?
    field: marriage.have_business
    datatype: yesnoradio
---
id: divorce answer continue with business
question: Warning! Businesses make divorce more complicated
subquestion: |
  **WARNING!** This tool may not be right for you. Dividing a business in a divorce is not simple. You cannot use this tool or the Michigan Legal Help website to do this.

  You can continue with the tool to get the forms you need to file an answer to your spouse's divorce complaint and to file a counterclaim for divorce. However, you may want to consider hiring a lawyer to help you divide your business. Also consider hiring a financial professional to value the business and to get advice about any tax issues that come with dividing a business. 
  
  Even if your spouse has a lawyer, consider hiring your own. Your spouse's lawyer does not represent you and has a duty to do what is best for your spouse. ${MLH_GUIDE_FULL}
fields: 
  - Do you want to continue with this tool now?: continue_with_business
    datatype: yesnoradio
---
id: marriage.have_experienced_domestic_violence
question: |
  Domestic violence
fields:
  - label: Have you experienced domestic violence or threats of domestic violence by your spouse?
    field: marriage.have_experienced_domestic_violence
    datatype: yesnoradio
---
if: marriage.have_experienced_domestic_violence
id: marriage.have_experienced_domestic_violence_continue
question: |
  Domestic violence
subquestion: |
  % if tool_ID == "JOD_only":
  Domestic violence is often at its worst when a relationship ends. It is important to take steps to be as safe as possible.
  % elif tool_ID == "divorce_complaint":
  Domestic violence is often at its worst when a relationship ends. It is important to take steps to be as safe as possible before you start a divorce. 
  % endif
  If there has been verbal, emotional, or physical abuse in your marriage, you may want to find a lawyer. Your local legal aid office or domestic violence agency may be able to help you. 
  
  To learn about how domestic violence can affect a divorce case and what you can do to keep safe, read [Domestic Violence and Divorce](https://michiganlegalhelp.org/resources/family/domestic-violence-and-divorce). To find a lawyer and contact information for local domestic violence agencies, use the [Guide to Legal Help](https://michiganlegalhelp.org/guide-to-legal-help).
fields:
  - label: Do you want to continue with the tool now?
    field: marriage.have_experienced_domestic_violence_continue
    datatype: yesnoradio
---
