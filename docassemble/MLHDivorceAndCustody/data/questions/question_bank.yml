# --------------------------------------------------------------------
## Employment and income info
# --------------------------------------------------------------------
---
code: |
  users[0].has_job
  if users[0].has_job:
    if tool_ID != "JOD_only" and (there_are_marital_children or user_wants_post_divorce_support): #for FOC23
      users[0].occupation
    users[0].job.employer.name.first
  users[0].has_professional_license

  interview_order_user_employment = True
---
# LHI: "Plaintiff Income" or "Defendant Income"
# used for FOC23 and fee waiver; never asked for JOD_only
# note some of this code is in the fee waiver shared_code.yml
code: |
  if there_are_marital_children or user_wants_post_divorce_support: #for FOC23
    if users[0].has_job:
      users[0].income.value
  if pa_status == "gets_assistance":
    pa_food_assistance_program 
    if pa_mdhhs or pa_other:
      if pa_mdhhs:
        pa_mdhhs_case_number
      if pa_other:
        pa_other_types
    elif pa_supplemental_security:
      pa_ssa_number
    pa_case_numbers_foc_23
    public_assistance_list
  if pa_status == "applied" and (there_are_marital_children or user_wants_post_divorce_support):
    pa_food_assistance_program 
    if pa_other:
      pa_other_types
    public_assistance_list

  interview_order_user_income = True
---
code: |
  other_parties[0].has_job
  if other_parties[0].has_job:
    if tool_ID == "divorce_complaint" and (there_are_marital_children or user_wants_post_divorce_support): #for FOC23
      other_parties[0].occupation
    other_parties[0].job.employer.name.first
  other_parties[0].has_professional_license

  interview_order_other_party_employment = True
---
# LHI: "Plaintiff Income" or "Defendant Income"
# never asked for JOD_only
# in divorce complaint, only asked if children or spousal support request by user (FOC23)
code: |
  if other_parties[0].has_job:
    other_parties[0].income.value
  if other_party_pa_status == "gets_assistance":
    op_pa_food_assistance_program 
    if op_pa_food_assistance_program or op_pa_medicaid or op_pa_family_independence_program or op_pa_women_infants_children or op_pa_state_disability or op_pa_state_emergency_relief or op_pa_refugee_assistance or op_pa_other:
      if op_pa_food_assistance_program or op_pa_medicaid or op_pa_family_independence_program or op_pa_women_infants_children or op_pa_state_disability or op_pa_state_emergency_relief or op_pa_refugee_assistance:
        op_pa_mdhhs_case_number
      if op_pa_other:
        op_pa_other_types
    elif op_pa_supplemental_security:
      op_pa_ssa_number
    op_pa_case_numbers_foc_23
    op_public_assistance_list
  
  if other_party_pa_status == "applied":
    op_pa_food_assistance_program 
    if op_pa_other:
      op_pa_other_types
    op_public_assistance_list
  
  interview_order_other_party_income = True

---
# LHI: "Plaintiff Employer" or "Defendant Employer"
id: user employment
question: Your employment
subquestion: |
  Answer the following questions about your employment as fully as you can. If you don’t have all the information or if you are afraid to disclose this information to ${ OP_label }, you can leave some answers blank, but the court may require answers later.
      
  All of the information you supply in this tool, including your employment information, will be included on forms that you will file with the court and deliver to ${ OP_label }. If you are afraid that sharing your employment information will put you at risk of harm, you should contact a lawyer to help you with your case. For more information, see [Domestic Violence and Divorce](https://michiganlegalhelp.org/resources/family/domestic-violence-and-divorce).   
fields:
  - Are you currently employed?: users[0].has_job
    datatype: yesnoradio
    required: False

---
# LHI: "Plaintiff Employer" or "Defendant Employer"
id: user occupation
question: Your occupation or field of work
fields:
  - What is your occupation?: users[0].occupation
    required: False
---
# LHI: "Plaintiff Employer" or "Defendant Employer"
if: users[0].has_job
id: user job
question: Your job
fields:
  - Employer name: users[0].job.employer.name.first
    required: False
  - label: Street Address or PO Box
    field: users[0].job.employer.address.address
    address autocomplete: True
    required: False
  - label: Apartment, suite, etc
    field: users[0].job.employer.address.unit
    required: False
  - label: City
    field: users[0].job.employer.address.city
    required: False
  - label: State or Province (two-letter abbreviation for U.S. states)
    field: users[0].job.employer.address.state
    default: MI
    input type: datalist
    code: |
      states_list()
    required: False
  - label: Zip or Postal Code
    field: users[0].job.employer.address.zip
    required: False
  - label: Country or Territory
    field: users[0].job.employer.address.country
    default: "US"
    code: |
      countries_list()
    required: False
  - Phone: users[0].job.employer.phone
    required: False
  - "Federal Employer Identification Number (FEIN), if known": users[0].job.FEIN
    required: False
