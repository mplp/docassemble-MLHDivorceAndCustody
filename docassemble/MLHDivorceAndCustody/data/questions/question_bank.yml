  if op_pa_state_disability:
    op_public_assistance_list.append("SDA")
  if op_pa_state_emergency_relief:
    op_public_assistance_list.append("SER")
  if op_pa_refugee_assistance:
    op_public_assistance_list.append("RAP")
  if op_pa_supplemental_security:
    op_public_assistance_list.append("SSI")
  if op_pa_other:
    op_public_assistance_list.append(f"other(${ op_pa_other_types})")
---
id: FOC 23 OP list of case numbers
code: |
  op_pa_case_numbers_foc_23 = []

  if op_pa_food_assistance_program or op_pa_medicaid or op_pa_family_independence_program or op_pa_women_infants_children or op_pa_state_disability or op_pa_state_emergency_relief or op_pa_refugee_assistance or op_pa_other:
