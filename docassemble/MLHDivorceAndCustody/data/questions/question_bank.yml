  if pa_state_emergency_relief:
    public_assistance_list.append("SER")
  if pa_refugee_assistance:
    public_assistance_list.append("RAP")
  if pa_supplemental_security:
    public_assistance_list.append("SSI")
  if pa_other:
    public_assistance_list.append(f"other ({ pa_other_types})")
---
