content: |
  Welcome to the Do-It-Yourself Answer and Counterclaim for Divorce tool.

  Use this tool if you are served with a complaint for divorce and want to file a written answer. 
---
id: divorce answer intro part 2
question: More about answers and counterclaims
continue button field: divorce_answer_intro_2
subquestion: |
  ## Answer
  An answer is an official response to your spouse's complaint for divorce. You must file an answer within the time stated on the summons, or a default may be entered against you. A default can make it more difficult for you to participate in your divorce case and ask the judge for the things you want.
  
  ## Counterclaim
  A counterclaim is needed if you want to:

  * **change your last name** as part of the divorce,
  * ask for **spousal support,** or
  * make sure the divorce case **can be finished** if your spouse stops participating. 

  ${collapse_template(cobra_counterclaim)}
  
  ## Your choice
  The first part of this tool will ask you questions to create an *Answer.* Then you can choose whether to stop there or continue to create a *Counterclaim.*
---
# ====================================================================
## interview_order
# ====================================================================
---
id: interview_order_michigan_divorce_answer
mandatory: True
scan for variables: False
code: |
  set_persistent_interview_specific_logic
  nav.set_section("review_full")
  nav.set_section("signpost_intro")
  snapshot_start
  MLH_intro_landing
  divorce_answer_intro_2
  MLH_standard_intro_pages

  nav.set_section("signpost_qualify")
  if not complaint_received:
    exit_no_MI_complaint
  complaint_type
  if complaint_type == "with_children":
    complaint_with_children_issue_continue
  else:
    complaint_without_children_issue_continue

  if marriage.have_experienced_domestic_violence:
    if not marriage.have_experienced_domestic_violence_continue:
      exit_general

  county_where_filed
  court_index
  the_court
  the_foc
  
  party_lived_6_months_MI
  if not party_lived_6_months_MI.any_true():
    exit_jurisdiction
  elif not party_ten_days_in_county.any_true():
    if not venue_issue_continue:
      exit_general
  
  docket_number
  divorce_judge

  nav.set_section("signpost_user")

  users.gather()
  users[0].name.first
  users[0].has_previous_name
  users[0].gender
  users[0].birthdate

  interview_order_user_contact_info

  other_parties.gather()
  other_parties[0].name.first
  other_parties[0].has_previous_name
  other_parties[0].gender
  other_parties[0].birthdate

  interview_order_other_parties_address_info

  if other_parties[0].mailing_address.yesno:
    other_parties[0].mailing_address.address
  other_parties[0].no_phone_number
  other_parties[0].email
  
  interview_order_other_parties_attorney

  nav.set_section("signpost_respond")
  complaint_paragraphs_intro
  complaint_paragraphs.gather()  
  other_statements_any

  nav.set_section("signpost_counterclaim")
 
  ### Start counterclaim section ###
  if want_counterclaim:   
    if not (counterclaim_180_day_test_met.any_true() and counterclaim_10_day_test_met.any_true()):
      if not counterclaim_jurisdiction_venue_problem_continue:
        exit_general
  
    else:
      if marriage.have_pension_retirement:
        if marriage.pension_contributions_made:
          marriage.pension_retirement_accounts_keep_own
          if not marriage.pension_retirement_accounts_continue:
            exit_general
        else:
          marriage.divide_separate_pension
  
      if marriage.have_business:
        if not continue_with_business:
          exit_general
  
      if need_temporary_order:
        if not temporary_order_continue:
          exit_general
  
      marriage.date
      marriage.address.city
      marriage.living_together_yn

      if marriage.real_property.there_are_any:
        if not marriage.real_property_all_agreed:
          if not continue_real_property:
            exit_general
  
      marriage.personal_property_acquired
      if marriage.debts.any:
        marriage.debts.pay_debts_in_own_names
        marriage.debts.any_in_both_names
  
      users[0].new_last_name_yn
  
      nav.set_section("signpost_spousal_support")
      interview_order_spousal_support

      nav.set_section("signpost_children")
      users[0].pregnant
      interview_order_children
  
      counterclaim_type # if not already set during interview_order_children
      if (complaint_type == "with_children" and counterclaim_type == "no_children") or (complaint_type == "no_children" and counterclaim_type == "with_children" and there_are_marital_children):
        complaint_mismatch_warning 
        # if pregnancy-only mismatch, warning given in pregnant_cc_with_kids_info
  
      if there_are_marital_children:
        nav.set_section("signpost_prior_cases")
        prior_family_cases.gather()
        nav.set_section("signpost_income_etc")
        users[0].insurance.gather()
        other_parties[0].insurance.gather()

      elif not there_are_marital_children:
        nav.set_section("signpost_income_etc")
  
      if counterclaim_type == "with_children" or user_wants_post_divorce_support:
        interview_order_user_employment
        interview_order_user_income
        interview_order_user_identifying_info
        users[0].has_alias
        interview_order_other_party_employment
        interview_order_other_party_income
        interview_order_other_party_identifying_info
        other_parties[0].has_alias

  create_counterclaim
  ### End counterclaim section ###
  
  nav.set_section("signpost_last_section")
  MLH_standard_outro_pages

  # just making sure these are defined
  plaintiffs
  defendants
  if create_counterclaim:
    stepchildren_for_addendum
  set_dynamic_instructions_variables

  al_user_bundle.generate_downloads_task
  nav.set_section("signpost_done")
  snapshot_download
  if not al_user_bundle.generate_downloads_task.ready():
    al_download_waiting_screen
  MLH_download