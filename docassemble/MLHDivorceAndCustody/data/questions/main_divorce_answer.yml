---
id: divorce answer intro part 2
question: More about answers and counterclaims
continue button field: divorce_answer_intro_2
subquestion: |
  ## Answer
  An answer is an official response to your spouse's complaint for divorce. You must file an answer within the time stated on the summons, or a default may be entered against you. A default can make it more difficult for you to participate in your divorce case and ask the judge for the things you want.
  
  ## Counterclaim
  You should file a counterclaim for divorce if you want to make sure that your divorce goes forward. If you do not file a counterclaim for divorce, and your spouse does something to have the original divorce case dismissed, your divorce case will end. Then, if you still want to get divorced, you will have to start over by filing a new case.

  A counterclaim is also needed if you want to:

  * **change your last name** as part of the divorce
  * ask for **spousal support**
  * ask the court to **address any other issue** or order something that your spouse did not request in their Complaint for Divorce

  ## Your choice
  The first part of this tool will ask you questions to create an answer. Then you can choose whether to stop there or continue to create a counterclaim.
