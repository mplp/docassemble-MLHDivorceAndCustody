template: MLH_welcome_message
content: |
  Welcome to the Do-It-Yourself Answer and Counterclaim for Divorce tool.

  Use this tool if you are served with a complaint for divorce and want to file a written answer. You must file an answer within the time stated on the summons, or a default may be entered against you. A default can make it more difficult for you to participate in your divorce case and ask the judge for the things you want.

  You can also use this tool if you want to file a counterclaim for divorce along with your answer. You should file a counterclaim for divorce if you want to make sure that your divorce goes forward. If you do not file a counterclaim for divorce, and your spouse does something to have the original divorce case dismissed, your divorce case will end. Then, if you still want to get divorced, you will have to start over by filing a new case.

  The first part of this tool will ask you questions that will be used to create your answer to your spouse’s complaint. The second part of the tool will ask you questions that can be used to create a counterclaim for divorce. You will have the option to stop at the end of the answer section or to continue to the counterclaim questions.
